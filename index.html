<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8D Audio Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #05080f;
    --panel: #0a0f1e;
    --border: #1a2a4a;
    --accent: #00d4ff;
    --accent2: #ff006e;
    --accent3: #a855f7;
    --glow: rgba(0, 212, 255, 0.15);
    --text: #c8e0ff;
    --dim: #4a6080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,50,80,0.3) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.4));
  }

  .header p {
    color: var(--dim);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Panel */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  /* Drop Zone */
  .drop-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    background: rgba(0,212,255,0.02);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,212,255,0.06);
    box-shadow: inset 0 0 30px rgba(0,212,255,0.05);
  }

  .drop-zone .icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
    filter: grayscale(0.3);
  }

  .drop-zone h3 {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }

  .drop-zone p {
    font-size: 0.72rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  /* File info */
  .file-info {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 4px;
    font-size: 0.78rem;
  }

  .file-info.show { display: flex; }

  .file-info .file-icon { font-size: 1.4rem; flex-shrink: 0; }

  .file-info .file-details { flex: 1; overflow: hidden; }

  .file-info .file-name {
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 0.82rem;
  }

  .file-info .file-size { color: var(--dim); font-size: 0.7rem; margin-top: 2px; }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Section labels */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Controls grid */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .control-item { display: flex; flex-direction: column; gap: 8px; }

  .control-item label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .control-item label span {
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
  }

  /* Slider */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(0,212,255,0.3);
    cursor: pointer;
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(0,212,255,0.5);
  }

  /* Visualizer */
  .visualizer-wrap {
    position: relative;
    height: 80px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  #visualizer {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Orbit indicator */
  .orbit-display {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
  }

  #orbitCanvas { width: 100%; height: 100%; }

  /* Player controls */
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-play {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    background: rgba(0,212,255,0.08);
    color: var(--accent);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(0,212,255,0.1);
  }

  .btn-play:hover {
    background: rgba(0,212,255,0.18);
    box-shadow: 0 0 20px rgba(0,212,255,0.25);
  }

  .btn-play:disabled {
    border-color: var(--border);
    color: var(--dim);
    cursor: not-allowed;
    box-shadow: none;
    background: none;
  }

  /* Time / seek */
  .time-area { flex: 1; display: flex; flex-direction: column; gap: 6px; }

  .time-bar-wrap {
    position: relative;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
  }

  .time-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.1s linear;
    pointer-events: none;
  }

  .time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--dim);
  }

  .volume-row input[type="range"] { width: 80px; }

  /* Export button */
  .btn-export {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .btn-export::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(168,85,247,0.08));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .btn-export:hover:not(:disabled)::before { opacity: 1; }

  .btn-export:hover:not(:disabled) {
    box-shadow: 0 0 20px rgba(0,212,255,0.2), inset 0 0 20px rgba(0,212,255,0.05);
  }

  .btn-export:disabled {
    border-color: var(--border);
    color: var(--dim);
    cursor: not-allowed;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    min-height: 34px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.5s infinite;
  }

  .status-dot.error { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: none; }
  .status-dot.success { background: #00ff9f; box-shadow: 0 0 6px #00ff9f; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Progress overlay for export */
  .export-progress {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 0.7rem;
    color: var(--accent);
  }

  .export-progress.show { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 500px) {
    .controls-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>8D AUDIO</h1>
    <p>Spatial Audio Processor &mdash; Non-Destructive</p>
  </div>

  <!-- File Load Panel -->
  <div class="panel">
    <div class="section-label">Input File</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="audio/*">
      <span class="icon">🎵</span>
      <h3>Drop Audio File Here</h3>
      <p>Or click to browse &mdash; MP3, WAV, OGG, FLAC, M4A</p>
    </div>

    <div class="file-info" id="fileInfo" style="margin-top:12px;">
      <span class="file-icon">🎧</span>
      <div class="file-details">
        <div class="file-name" id="fileName">—</div>
        <div class="file-size" id="fileSize">—</div>
      </div>
      <button class="btn-clear" id="btnClear">✕ CLEAR</button>
    </div>
  </div>

  <!-- 8D Controls Panel -->
  <div class="panel">
    <div class="section-label">8D Parameters</div>
    <div class="controls-grid">
      <div class="control-item">
        <label>ROTATION SPEED <span id="speedVal">0.30</span> Hz</label>
        <input type="range" id="speed" min="0.05" max="2.0" step="0.05" value="0.30">
      </div>
      <div class="control-item">
        <label>ORBIT RADIUS <span id="radiusVal">1.00</span></label>
        <input type="range" id="radius" min="0.1" max="1.0" step="0.05" value="1.0">
      </div>
      <div class="control-item">
        <label>REVERB MIX <span id="reverbVal">0.35</span></label>
        <input type="range" id="reverb" min="0.0" max="1.0" step="0.05" value="0.35">
      </div>
      <div class="control-item">
        <label>ELEVATION <span id="elevationVal">0.00</span></label>
        <input type="range" id="elevation" min="-1.0" max="1.0" step="0.1" value="0.0">
      </div>
    </div>
  </div>

  <!-- Playback Panel -->
  <div class="panel">
    <div class="section-label">Playback Preview</div>

    <div class="visualizer-wrap">
      <canvas id="visualizer"></canvas>
      <div class="orbit-display">
        <canvas id="orbitCanvas" width="60" height="60"></canvas>
      </div>
    </div>

    <div class="player-row">
      <button class="btn-play" id="btnPlay" disabled title="Play / Pause">▶</button>
      <div class="time-area">
        <div class="time-bar-wrap" id="seekBar">
          <div class="time-bar-fill" id="seekFill"></div>
        </div>
        <div class="time-labels">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>
      <div class="volume-row">
        🔊
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8">
      </div>
    </div>
  </div>

  <!-- Export Panel -->
  <div class="panel">
    <div class="section-label">Export</div>
    <button class="btn-export" id="btnExport" disabled>⬇ Export 8D Audio (WAV)</button>
    <div class="export-progress" id="exportProgress" style="margin-top:10px;">
      <div class="spinner"></div>
      <span id="exportStatus">Processing offline render...</span>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Load an audio file to begin</span>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let audioCtx = null;
let sourceBuffer = null;   // decoded AudioBuffer (original, never modified)
let playSource = null;     // current BufferSourceNode
let gainNode = null;
let pannerNode = null;
let convolverNode = null;
let dryGainNode = null;
let wetGainNode = null;
let analyserNode = null;

let isPlaying = false;
let startTime = 0;       // audioCtx.currentTime when play started
let pauseOffset = 0;     // where in the buffer we paused
let animationId = null;
let orbitAngle = 0;
let orbitAnimId = null;

const params = {
  speed: 0.30,
  radius: 1.0,
  reverb: 0.35,
  elevation: 0.0,
  volume: 0.8
};

// ─────────────────────────────────────────────
// UI Elements
// ─────────────────────────────────────────────
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const fileInfoEl  = document.getElementById('fileInfo');
const fileNameEl  = document.getElementById('fileName');
const fileSizeEl  = document.getElementById('fileSize');
const btnClear    = document.getElementById('btnClear');
const btnPlay     = document.getElementById('btnPlay');
const btnExport   = document.getElementById('btnExport');
const seekBar     = document.getElementById('seekBar');
const seekFill    = document.getElementById('seekFill');
const timeCurrent = document.getElementById('timeCurrent');
const timeDuration= document.getElementById('timeDuration');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const exportProgress = document.getElementById('exportProgress');
const exportStatus   = document.getElementById('exportStatus');
const visCanvas   = document.getElementById('visualizer');
const orbitCanvas = document.getElementById('orbitCanvas');

const sliders = {
  speed:     document.getElementById('speed'),
  radius:    document.getElementById('radius'),
  reverb:    document.getElementById('reverb'),
  elevation: document.getElementById('elevation'),
  volume:    document.getElementById('volume'),
};

// ─────────────────────────────────────────────
// Slider UI wiring
// ─────────────────────────────────────────────
const displays = {
  speed:     document.getElementById('speedVal'),
  radius:    document.getElementById('radiusVal'),
  reverb:    document.getElementById('reverbVal'),
  elevation: document.getElementById('elevationVal'),
};

Object.entries(sliders).forEach(([key, el]) => {
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    params[key] = v;
    if (displays[key]) displays[key].textContent = v.toFixed(2);
    if (gainNode && key === 'volume') gainNode.gain.value = v;
    if (wetGainNode && dryGainNode && key === 'reverb') {
      wetGainNode.gain.value = v;
      dryGainNode.gain.value = 1 - v;
    }
  });
});

// ─────────────────────────────────────────────
// File Handling
// ─────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
btnClear.addEventListener('click', clearFile);

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(2) + ' MB';
}

function formatTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

async function handleFile(file) {
  setStatus('loading', 'Decoding audio file...');
  stopPlayback();

  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const arrayBuffer = await file.arrayBuffer();
    sourceBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    fileInfoEl.classList.add('show');
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = `${formatSize(file.size)} · ${sourceBuffer.numberOfChannels}ch · ${sourceBuffer.sampleRate}Hz · ${formatTime(sourceBuffer.duration)}`;
    dropZone.style.display = 'none';

    btnPlay.disabled = false;
    btnExport.disabled = false;
    timeDuration.textContent = formatTime(sourceBuffer.duration);
    timeCurrent.textContent = '0:00';
    seekFill.style.width = '0%';

    pauseOffset = 0;
    setStatus('idle', `Loaded: ${file.name}`);
  } catch (err) {
    setStatus('error', 'Failed to decode audio: ' + err.message);
  }
}

function clearFile() {
  stopPlayback();
  sourceBuffer = null;
  fileInput.value = '';
  fileInfoEl.classList.remove('show');
  dropZone.style.display = '';
  btnPlay.disabled = true;
  btnExport.disabled = true;
  timeCurrent.textContent = '0:00';
  timeDuration.textContent = '0:00';
  seekFill.style.width = '0%';
  pauseOffset = 0;
  setStatus('idle', 'Load an audio file to begin');
}

// ─────────────────────────────────────────────
// Audio Graph Construction
// ─────────────────────────────────────────────
async function makeImpulseResponse(ctx, duration = 2.5, decay = 3.0) {
  const rate   = ctx.sampleRate;
  const length = rate * duration;
  const ir     = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return ir;
}

async function buildGraph(ctx, buffer, offset = 0) {
  // Source
  const src = ctx.createBufferSource();
  src.buffer = buffer;

  // Gain (volume)
  const gain = ctx.createGain();
  gain.gain.value = params.volume;

  // PannerNode for 3D spatial
  const panner = ctx.createPanner();
  panner.panningModel  = 'HRTF';
  panner.distanceModel = 'linear';
  panner.maxDistance   = 10000;
  panner.refDistance   = 1;
  panner.rolloffFactor = 1;
  setInitialPannerPosition(panner, offset);

  // Convolver (reverb)
  const convolver = ctx.createConvolver();
  convolver.buffer = await makeImpulseResponse(ctx);

  // Dry/Wet mix
  const dry = ctx.createGain();
  const wet = ctx.createGain();
  dry.gain.value = 1 - params.reverb;
  wet.gain.value = params.reverb;

  // Analyser
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 128;

  // Routing: src → panner → dry → gain → analyser → dest
  //                       → convolver → wet → gain
  src.connect(panner);
  panner.connect(dry);
  panner.connect(convolver);
  convolver.connect(wet);
  dry.connect(gain);
  wet.connect(gain);
  gain.connect(analyser);
  analyser.connect(ctx.destination);

  return { src, gain, panner, convolver, dry, wet, analyser };
}

function setInitialPannerPosition(panner, offset) {
  const angle = offset * params.speed * Math.PI * 2;
  const x = Math.sin(angle) * params.radius;
  const z = Math.cos(angle) * params.radius;
  const y = params.elevation * 0.5;
  if (panner.positionX) {
    panner.positionX.value = x;
    panner.positionY.value = y;
    panner.positionZ.value = z;
  } else {
    panner.setPosition(x, y, z);
  }
}

// ─────────────────────────────────────────────
// Playback
// ─────────────────────────────────────────────
btnPlay.addEventListener('click', togglePlay);

async function togglePlay() {
  if (!sourceBuffer) return;
  if (isPlaying) { pausePlayback(); }
  else { await startPlayback(); }
}

async function startPlayback() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const graph = await buildGraph(audioCtx, sourceBuffer, pauseOffset);
  playSource   = graph.src;
  gainNode     = graph.gain;
  pannerNode   = graph.panner;
  convolverNode= graph.convolver;
  dryGainNode  = graph.dry;
  wetGainNode  = graph.wet;
  analyserNode = graph.analyser;

  playSource.start(0, pauseOffset);
  startTime = audioCtx.currentTime - pauseOffset;
  isPlaying = true;
  btnPlay.textContent = '⏸';
  setStatus('active', '8D Playback active');

  playSource.onended = () => {
    if (isPlaying) {
      isPlaying = false;
      pauseOffset = 0;
      btnPlay.textContent = '▶';
      seekFill.style.width = '0%';
      timeCurrent.textContent = '0:00';
      setStatus('idle', 'Playback finished');
    }
  };

  startOrbitAnimation();
  startVisualizerAnimation();
  startSeekUpdate();
}

function pausePlayback() {
  if (!playSource) return;
  pauseOffset = audioCtx.currentTime - startTime;
  if (pauseOffset >= sourceBuffer.duration) pauseOffset = 0;
  playSource.onended = null;
  playSource.stop();
  playSource = null;
  isPlaying = false;
  btnPlay.textContent = '▶';
  cancelAnimationFrame(animationId);
  cancelAnimationFrame(orbitAnimId);
  clearInterval(seekInterval);
  setStatus('idle', 'Paused');
}

function stopPlayback() {
  if (playSource) {
    playSource.onended = null;
    try { playSource.stop(); } catch(e) {}
    playSource = null;
  }
  isPlaying = false;
  btnPlay.textContent = '▶';
  cancelAnimationFrame(animationId);
  cancelAnimationFrame(orbitAnimId);
  clearInterval(seekInterval);
}

// ─────────────────────────────────────────────
// 8D Panner Animation
// ─────────────────────────────────────────────
function startOrbitAnimation() {
  function frame() {
    if (!isPlaying) return;
    const elapsed = audioCtx.currentTime - startTime;
    const angle = elapsed * params.speed * Math.PI * 2;
    const x = Math.sin(angle) * params.radius;
    const z = Math.cos(angle) * params.radius;
    const y = params.elevation * 0.5;

    if (pannerNode) {
      if (pannerNode.positionX) {
        pannerNode.positionX.setTargetAtTime(x, audioCtx.currentTime, 0.02);
        pannerNode.positionY.setTargetAtTime(y, audioCtx.currentTime, 0.02);
        pannerNode.positionZ.setTargetAtTime(z, audioCtx.currentTime, 0.02);
      } else {
        pannerNode.setPosition(x, y, z);
      }
    }

    // Draw orbit indicator
    drawOrbit(angle);
    orbitAnimId = requestAnimationFrame(frame);
  }
  frame();
}

function drawOrbit(angle) {
  const canvas = orbitCanvas;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W*0.35;
  ctx.clearRect(0, 0, W, H);

  // Orbit ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,212,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Center dot (listener)
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,212,255,0.5)';
  ctx.fill();

  // Moving dot (source)
  const sx = cx + Math.sin(angle) * r * params.radius;
  const sy = cy - Math.cos(angle) * r * params.radius;

  const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 6);
  grad.addColorStop(0, '#00d4ff');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(sx, sy, 6, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(sx, sy, 3, 0, Math.PI*2);
  ctx.fillStyle = '#00d4ff';
  ctx.fill();

  // Line from center to dot
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(sx, sy);
  ctx.strokeStyle = 'rgba(0,212,255,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ─────────────────────────────────────────────
// Visualizer
// ─────────────────────────────────────────────
function startVisualizerAnimation() {
  const canvas = visCanvas;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    if (!isPlaying || !analyserNode) return;
    const W = canvas.width, H = canvas.height;
    const bufLen = analyserNode.frequencyBinCount;
    const dataArr = new Uint8Array(bufLen);
    analyserNode.getByteFrequencyData(dataArr);

    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, 'rgba(0,0,0,0)');
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const barW = (W / bufLen) * 1.8;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 255;
      const barH = v * H * 0.85;

      const hue = 180 + v * 120;
      const grad = ctx.createLinearGradient(0, H - barH, 0, H);
      grad.addColorStop(0, `hsla(${hue}, 100%, 65%, 0.9)`);
      grad.addColorStop(1, `hsla(${hue}, 100%, 40%, 0.3)`);

      ctx.fillStyle = grad;
      ctx.fillRect(x, H - barH, barW - 1, barH);
      x += barW + 1;
    }

    animationId = requestAnimationFrame(draw);
  }
  draw();
}

// ─────────────────────────────────────────────
// Seek Bar
// ─────────────────────────────────────────────
let seekInterval = null;

function startSeekUpdate() {
  clearInterval(seekInterval);
  seekInterval = setInterval(() => {
    if (!isPlaying || !sourceBuffer) return;
    const elapsed = audioCtx.currentTime - startTime;
    const pct = Math.min(elapsed / sourceBuffer.duration, 1);
    seekFill.style.width = (pct * 100) + '%';
    timeCurrent.textContent = formatTime(elapsed);
  }, 200);
}

seekBar.addEventListener('click', (e) => {
  if (!sourceBuffer) return;
  const rect = seekBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const newOffset = pct * sourceBuffer.duration;
  pauseOffset = Math.max(0, Math.min(newOffset, sourceBuffer.duration));
  seekFill.style.width = (pct * 100) + '%';
  timeCurrent.textContent = formatTime(pauseOffset);
  if (isPlaying) {
    stopPlayback();
    startPlayback();
  }
});

// ─────────────────────────────────────────────
// Offline Export (non-destructive WAV)
// ─────────────────────────────────────────────
btnExport.addEventListener('click', exportAudio);

async function exportAudio() {
  if (!sourceBuffer) return;
  btnExport.disabled = true;
  exportProgress.classList.add('show');
  exportStatus.textContent = 'Rendering 8D audio offline...';
  setStatus('active', 'Exporting...');

  try {
    const duration  = sourceBuffer.duration;
    const sampleRate = sourceBuffer.sampleRate;
    const offlineCtx = new OfflineAudioContext(2, Math.ceil(duration * sampleRate), sampleRate);

    const graph = await buildGraph(offlineCtx, sourceBuffer, 0);
    const src     = graph.src;
    const panner  = graph.panner;

    // Pre-render panner positions as scheduled automation
    const steps = Math.ceil(duration * 60);
    for (let i = 0; i <= steps; i++) {
      const t     = (i / steps) * duration;
      const angle = t * params.speed * Math.PI * 2;
      const x = Math.sin(angle) * params.radius;
      const z = Math.cos(angle) * params.radius;
      const y = params.elevation * 0.5;

      if (panner.positionX) {
        panner.positionX.setValueAtTime(x, t);
        panner.positionY.setValueAtTime(y, t);
        panner.positionZ.setValueAtTime(z, t);
      }
    }

    src.start(0);
    exportStatus.textContent = 'Running offline render... (may take a moment)';
    const rendered = await offlineCtx.startRendering();

    exportStatus.textContent = 'Encoding WAV...';
    const wavBlob = audioBufferToWav(rendered);
    const url = URL.createObjectURL(wavBlob);
    const a = document.createElement('a');
    a.href = url;

    // Append _8D to original filename
    const orig = fileNameEl.textContent || 'audio';
    const dot = orig.lastIndexOf('.');
    const base = dot > 0 ? orig.slice(0, dot) : orig;
    const ext  = dot > 0 ? orig.slice(dot) : '.wav';
    a.download = `${base}_8D.wav`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);

    exportProgress.classList.remove('show');
    btnExport.disabled = false;
    setStatus('success', 'Export complete — saved as WAV');
    setTimeout(() => setStatus('idle', `Loaded: ${fileNameEl.textContent}`), 3000);
  } catch(err) {
    exportProgress.classList.remove('show');
    btnExport.disabled = false;
    setStatus('error', 'Export failed: ' + err.message);
  }
}

// ─────────────────────────────────────────────
// WAV Encoder
// ─────────────────────────────────────────────
function audioBufferToWav(buffer) {
  const numCh      = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const length     = buffer.length;
  const byteLen    = length * numCh * 2; // 16-bit
  const arrayBuf   = new ArrayBuffer(44 + byteLen);
  const view       = new DataView(arrayBuf);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }
  function write16(offset, v) { view.setInt16(offset, v, true); }
  function write32(offset, v) { view.setUint32(offset, v, true); }

  writeStr(0, 'RIFF');
  write32(4,  36 + byteLen);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  write32(16, 16);
  write16(20, 1);            // PCM
  write16(22, numCh);
  write32(24, sampleRate);
  write32(28, sampleRate * numCh * 2);
  write16(32, numCh * 2);
  write16(34, 16);
  writeStr(36, 'data');
  write32(40, byteLen);

  let offset = 44;
  const channels = [];
  for (let ch = 0; ch < numCh; ch++) channels.push(buffer.getChannelData(ch));

  for (let i = 0; i < length; i++) {
    for (let ch = 0; ch < numCh; ch++) {
      let s = Math.max(-1, Math.min(1, channels[ch][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }

  return new Blob([arrayBuf], { type: 'audio/wav' });
}

// ─────────────────────────────────────────────
// Status helper
// ─────────────────────────────────────────────
function setStatus(type, msg) {
  statusText.textContent = msg;
  statusDot.className = 'status-dot';
  if (type === 'active')  statusDot.classList.add('active');
  if (type === 'error')   statusDot.classList.add('error');
  if (type === 'success') statusDot.classList.add('success');
}

// ─────────────────────────────────────────────
// Draw idle orbit ring on load
// ─────────────────────────────────────────────
drawOrbit(0);
</script>
